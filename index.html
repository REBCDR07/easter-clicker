<!doctype html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PutaClic - Special Paques</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Orbitron:wght@400;700;900&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="screen-menu" class="screen active">
        <div id="instructions">
            <button id="btn-instructions" type="button" aria-expanded="false" aria-controls="instructions-content">Comment jouer ?</button>
            <div class="instructions-content mode-picker" id="instructions-content" hidden>
                <p class="instructions-section">Choisis ton mode</p>
                <button type="button" class="mode-help-btn" data-mode-help="easy">Petit poussin</button>
                <button type="button" class="mode-help-btn" data-mode-help="medium">Lapin malin</button>
                <button type="button" class="mode-help-btn" data-mode-help="hard">Chasseur d'oeufs</button>
            </div>
        </div>

        <img src="assets/title.png" alt="PutaClic - Special Paques" class="title-logo">

        <div class="menu-buttons">
            <button data-difficulty="easy"><span class="mode-label">Petit poussin</span><img src="assets/shield-easy.png" alt="bouclier" class="btn-icon"></button>
            <button data-difficulty="medium"><span class="mode-label">Lapin malin</span><img src="assets/swords-medium.png" alt="epees" class="btn-icon"></button>
            <button data-difficulty="hard"><span class="mode-label">Chasseur d'oeufs</span><img src="assets/skull-hard.png" alt="crane" class="btn-icon"></button>
        </div>

        <div id="high-scores">
            <h3>Tes meilleurs scores</h3>
            <p>Petit poussin : <span id="high-easy">0</span></p>
            <p>Lapin malin : <span id="high-medium">0</span></p>
            <p>Chasseur d'oeufs : <span id="high-hard">0</span></p>
        </div>
    </div>

    <div id="screen-game" class="screen">
        <div id="hud">
            <span>Score : <span id="score">0</span></span>
            <span>Combo : <span id="combo">x1</span></span>
            <span>Temps : <span id="timer">60</span>s</span>
            <span class="hud-lives">Vies : <span id="lives-icons" class="lives-icons" aria-live="polite" aria-label="3 vies restantes"></span></span>
            <button id="btn-pause" class="hud-btn" type="button">Pause</button>
            <button id="btn-mute" class="hud-btn" type="button">Son : ON</button>
        </div>
        <div id="game-area" aria-label="Zone de jeu"></div>
    </div>

    <div id="screen-gameover" class="screen">
        <h1>Fin de partie !</h1>
        <p>Ton score : <span id="final-score">0</span></p>
        <p id="new-record" style="display:none;">Nouveau record !</p>
        <button id="btn-replay" type="button">Rejouer</button>
        <button id="btn-menu" type="button">Menu</button>
    </div>

    <div id="life-modal" class="life-modal" aria-live="assertive" aria-atomic="true">
        <div class="life-modal-panel" role="dialog" aria-modal="true" aria-labelledby="life-modal-title">
            <h2 id="life-modal-title">Vie perdue</h2>
            <p id="life-modal-text">Vie perdue !</p>
            <button id="life-modal-resume" type="button" class="life-modal-resume">Reprendre</button>
        </div>
    </div>

    <div id="help-modal" class="help-modal" hidden>
        <div class="help-modal-panel" role="dialog" aria-modal="true" aria-labelledby="help-modal-title">
            <button id="help-modal-close" type="button" class="help-modal-close">Fermer</button>
            <h2 id="help-modal-title">Instructions</h2>
            <div id="help-modal-content" class="help-modal-content"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
